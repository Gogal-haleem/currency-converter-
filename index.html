<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="All1">
<header>
    <div class="Intro">
        <h1> Currency  Converter</h1>
    </div>
</header>



<div class="Input">
    <p class="p">ENTER THE AMOUNT </p>
      <input type="number" placeholder="0.00" class="input">

</div>
<div class="ConvertFrom">
    <p>FROM</p>
    <select name="From"  class="from">
      <option value="PKR" class="i">PKR</option>
      <option value="INR" class="i">INR</option>
      <option value="USD" class="i">USD</option>
      <option value="EUR" class="i">EUR</option>
    </select>
</div>
<div class="ConvertedTo">
    <p>TO</p>
    <select name="To"  class="to">
         <option value="PKR" class="m">PKR</option>
         <option value="INR" class="m">INR</option>
         <option value="USD" class="m">USD</option>
         <option value="EUR" class="m">EUR</option>
    </select>
</div>
<div class="Input2">
    <input type="text" placeholder="CONVERTED AMOUNT" class="input1">
</div>

</div>
<script src="new.js"></script>
</body>
</html>
